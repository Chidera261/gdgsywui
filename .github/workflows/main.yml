name: VPS Emulator Eternal V4 (Anti-Hang)

on:
  workflow_dispatch:
    inputs:
      generation:
        description: 'Generation'
        default: '1'

jobs:
  vps-runtime:
    runs-on: ubuntu-latest
    env:
      IDRIVE_ACCESS_KEY: "1wSsXXLgOy5R200QdufF"
      IDRIVE_SECRET_KEY: "VLmiPgwEwYGijMrry8jGXV2R3Cw2uSr5inFJoZnR"
      IDRIVE_ENDPOINT: "https://j7a4.la.idrivee2-35.com"
      BUCKET_NAME: "storage"
      PM2_HOME: /home/runner/.pm2
    
    steps:
      - name: Checkout Bootloader
        uses: actions/checkout@v4

      - name: Mount & Provision
        run: |
          sudo npm install -g pm2
          chmod +x install.sh
          ./install.sh
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Restore PM2 State (Surgical Repair)
        run: |
          # Start daemon in background and suppress the ASCII splash hang
          npx pm2 ping > /dev/null 2>&1 &
          sleep 10
          
          if [ -f $PM2_HOME/dump.pm2 ]; then
            echo "🔄 Correcting paths for current VM..."
            node -e "
              const fs = require('fs');
              const path = process.env.PM2_HOME + '/dump.pm2';
              try {
                if (fs.existsSync(path)) {
                  const data = fs.readFileSync(path, 'utf8');
                  const repaired = data.replace(/\/home\/runner\/work\/[^/]+\/[^/]+/g, process.env.GITHUB_WORKSPACE);
                  fs.writeFileSync(path, repaired);
                  console.log('✅ Path repair successful');
                }
              } catch (e) { console.error('❌ Path repair failed:', e.message); }
            "
            # Resurrect without holding the shell hostage
            npx pm2 resurrect || echo "⚠️ Nothing to resurrect."
          fi

      - name: Connectivity Info
        run: |
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          echo "---------------------------------------------------"
          echo "🚀 GENERATION: ${{ github.event.inputs.generation }}"
          echo "SSH: $(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')"
          echo "WEB: $(tmate -S /tmp/tmate.sock display -p '#{tmate_web}')"
          echo "---------------------------------------------------"

      - name: The 5.5-Hour Hand-off
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          sleep 19800
          npx pm2 save --force
          
          NEXT_GEN=$(( ${{ github.event.inputs.generation }} + 1 ))
          curl -L -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/vps-eternal-v4.yaml/dispatches \
            -d "{\"ref\":\"${{ github.ref_name }}\", \"inputs\": {\"generation\": \"$NEXT_GEN\"}}"
          sleep 600
          
