name: VPS Emulator Eternal V5.2.2

on:
  workflow_dispatch:
    inputs:
      generation:
        default: '1'

jobs:
  vps-runtime:
    runs-on: ubuntu-latest
    env:
      # Now safely pulling from GitHub Secrets
      IDRIVE_ACCESS_KEY: ${{ secrets.IDRIVE_ACCESS_KEY }}
      IDRIVE_SECRET_KEY: ${{ secrets.IDRIVE_SECRET_KEY }}
      IDRIVE_ENDPOINT: ${{ secrets.IDRIVE_ENDPOINT }}
      BUCKET_NAME: "storage"
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Provision & Pull
        run: |
          sudo npm install -g pm2
          chmod +x install.sh
          ./install.sh
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Restore PM2 State
        run: |
          echo "⏳ Waiting for environment synchronization..."
          while [ ! -f /home/runner/.files_ready ]; do sleep 2; done
          while [ ! -f /home/runner/.deps_ready ]; do sleep 2; done
          
          pm2 ping
          if [ -f /home/runner/.pm2/dump.pm2 ]; then
            echo "✅ dump.pm2 found. Attempting resurrection..."
            pm2 resurrect || echo "⚠️ PM2 found no processes to restore."
            pm2 restart all --update-env || echo "No active processes to restart."
          else
            echo "ℹ️ No previous PM2 state found. Ready for first-time setup."
          fi

      - name: Background Sync Loop
        run: |
          (
            while true; do
              sleep 180
              pm2 save --force > /dev/null 2>&1
              nice -n 19 rclone sync /home/runner idrive:$BUCKET_NAME \
                --exclude "actions-runner/**" \
                --exclude ".github/**" \
                --exclude "**/node_modules/**" \
                --exclude ".pm2/*.sock" \
                --exclude ".pm2/*.pid" \
                --exclude ".cache/**" --quiet
            done
          ) &

      - name: 5.5-Hour Flush & Handoff
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          sleep 19800
          echo "🚨 Starting end-of-generation handoff..."
          pm2 save --force
          rclone sync /home/runner idrive:$BUCKET_NAME \
            --exclude "actions-runner/**" \
            --exclude "**/node_modules/**" \
            --exclude ".pm2/*.sock" \
            --exclude ".pm2/*.pid" \
            --exclude ".cache/**"
          
          NEXT_GEN=$(( ${{ github.event.inputs.generation }} + 1 ))
          
          # FIXED: Now correctly triggers main.yml
          curl -L -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/v5.yml/dispatches \
            -d "{\"ref\":\"${{ github.ref_name }}\", \"inputs\": {\"generation\": \"$NEXT_GEN\"}}"
          sleep 600
          
