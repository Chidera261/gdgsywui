name: VPS Emulator Eternal V4 (Path Fixed)

on:
  workflow_dispatch:
    inputs:
      generation:
        default: '1'

jobs:
  vps-runtime:
    runs-on: ubuntu-latest
    env:
      IDRIVE_ACCESS_KEY: "1wSsXXLgOy5R200QdufF"
      IDRIVE_SECRET_KEY: "VLmiPgwEwYGijMrry8jGXV2R3Cw2uSr5inFJoZnR"
      IDRIVE_ENDPOINT: "https://j7a4.la.idrivee2-35.com"
      BUCKET_NAME: "storage"
      # CRITICAL: Path must match install.sh
      PM2_HOME: "${{ github.workspace }}/.pm2_eternal"
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Provision & Pull
        run: |
          sudo npm install -g pm2
          chmod +x install.sh
          ./install.sh
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Restore PM2 State
        run: |
          # The install.sh already set up the folder. Just ping and resurrect.
          pm2 ping
          
          if [ -f $PM2_HOME/dump.pm2 ]; then
            echo "🔄 Surgical Path Repair in $PM2_HOME/dump.pm2"
            node -e "
              const fs = require('fs');
              const path = process.env.PM2_HOME + '/dump.pm2';
              if (fs.existsSync(path)) {
                let data = fs.readFileSync(path, 'utf8');
                // Fixes paths from previous generation to current
                data = data.replace(/\/home\/runner\/work\/[^/]+\/[^/]+/g, process.env.GITHUB_WORKSPACE);
                fs.writeFileSync(path, data);
                console.log('✅ Repair Done');
              }
            "
            pm2 resurrect || echo "First run."
          fi

      - name: Background Sync Loop
        run: |
          (
            while true; do
              sleep 180
              pm2 save --force > /dev/null 2>&1
              # Sync the whole workspace including the .pm2_eternal folder
              nice -n 19 rclone sync $GITHUB_WORKSPACE idrive:$BUCKET_NAME \
                --exclude ".git/**" \
                --exclude ".github/**" \
                --quiet
            done
          ) &

      - name: Connectivity Info
        run: |
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          echo "---------------------------------------------------"
          echo "SSH: $(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')"
          echo "---------------------------------------------------"

      - name: 5.5-Hour Flush & Handoff
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          sleep 19800
          pm2 save --force
          rclone sync $GITHUB_WORKSPACE idrive:$BUCKET_NAME --exclude ".git/**" --exclude ".github/**"
          
          NEXT_GEN=$(( ${{ github.event.inputs.generation }} + 1 ))
          curl -L -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/vps-eternal-v4.yaml/dispatches \
            -d "{\"ref\":\"${{ github.ref_name }}\", \"inputs\": {\"generation\": \"$NEXT_GEN\"}}"
          sleep 600
          
