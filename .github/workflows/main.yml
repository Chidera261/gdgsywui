name: VPS Emulator Eternal V4 (Strict Exclusion)

on:
  workflow_dispatch:
    inputs:
      generation:
        default: '1'

jobs:
  vps-runtime:
    runs-on: ubuntu-latest
    env:
      IDRIVE_ACCESS_KEY: "1wSsXXLgOy5R200QdufF"
      IDRIVE_SECRET_KEY: "VLmiPgwEwYGijMrry8jGXV2R3Cw2uSr5inFJoZnR"
      IDRIVE_ENDPOINT: "https://j7a4.la.idrivee2-35.com"
      BUCKET_NAME: "storage"
      PM2_HOME: /home/runner/.pm2
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Provision & Pull
        run: |
          sudo npm install -g pm2
          chmod +x install.sh
          ./install.sh
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Background Sync Loop
        run: |
          (
            while true; do
              sleep 180
              # Save PM2 state to a file in the workspace
              pm2 save --force > /dev/null 2>&1
              cp /home/runner/.pm2/dump.pm2 $GITHUB_WORKSPACE/.pm2_dump 2>/dev/null || true
              
              # Sync everything EXCEPT git and workflows
              nice -n 19 rclone sync $GITHUB_WORKSPACE idrive:$BUCKET_NAME \
                --exclude ".git/**" \
                --exclude ".github/**" \
                --quiet
            done
          ) &

      - name: Connectivity Info
        run: |
          # Prevent SSH timeouts
          mkdir -p ~/.ssh
          echo "ServerAliveInterval 30" >> ~/.ssh/config
          
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          echo "---------------------------------------------------"
          echo "SSH: $(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')"
          echo "WEB: $(tmate -S /tmp/tmate.sock display -p '#{tmate_web}')"
          echo "---------------------------------------------------"

      - name: 5.5-Hour Flush & Handoff
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          sleep 19800
          pm2 save --force
          cp $PM2_HOME/dump.pm2 $GITHUB_WORKSPACE/.pm2_dump
          
          # Final sync with exclusions
          rclone sync $GITHUB_WORKSPACE idrive:$BUCKET_NAME \
            --exclude ".git/**" \
            --exclude ".github/**"
          
          NEXT_GEN=$(( ${{ github.event.inputs.generation }} + 1 ))
          curl -L -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/vps-eternal-v4.yaml/dispatches \
            -d "{\"ref\":\"${{ github.ref_name }}\", \"inputs\": {\"generation\": \"$NEXT_GEN\"}}"
          sleep 600
          
