name: VPS Emulator Eternal V5.2

on:
  workflow_dispatch:
    inputs:
      generation:
        default: '1'

jobs:
  vps-runtime:
    runs-on: ubuntu-latest
    env:
      IDRIVE_ACCESS_KEY: "1wSsXXLgOy5R200QdufF"
      IDRIVE_SECRET_KEY: "VLmiPgwEwYGijMrry8jGXV2R3Cw2uSr5inFJoZnR"
      IDRIVE_ENDPOINT: "https://j7a4.la.idrivee2-35.com"
      BUCKET_NAME: "storage"
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Provision & Pull
        run: |
          sudo npm install -g pm2
          chmod +x install.sh
          ./install.sh
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Restore PM2 State
        run: |
          while [ ! -f /home/runner/.deps_ready ]; do sleep 5; done
          pm2 ping
          if [ -f /home/runner/.pm2/dump.pm2 ]; then
            pm2 resurrect || echo "Starting fresh."
            pm2 restart all --update-env
          fi

      - name: Background Sync Loop
        run: |
          (
            while true; do
              sleep 180
              pm2 save --force > /dev/null 2>&1
              # Keep iDrive updated with the entire home dir
              nice -n 19 rclone sync /home/runner idrive:$BUCKET_NAME \
                --exclude "actions-runner/**" \
                --exclude ".github/**" \
                --exclude "**/node_modules/**" \
                --exclude ".pm2/*.sock" \
                --exclude ".pm2/*.pid" \
                --exclude ".cache/**" --quiet
            done
          ) &

      - name: 5.5-Hour Flush & Handoff
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          sleep 19800
          pm2 save --force
          rclone sync /home/runner idrive:$BUCKET_NAME \
            --exclude "actions-runner/**" \
            --exclude "**/node_modules/**" \
            --exclude ".pm2/*.sock" \
            --exclude ".pm2/*.pid" \
            --exclude ".cache/**"
          
          NEXT_GEN=$(( ${{ github.event.inputs.generation }} + 1 ))
          curl -L -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
            -d "{\"ref\":\"${{ github.ref_name }}\", \"inputs\": {\"generation\": \"$NEXT_GEN\"}}"
          sleep 600
          
